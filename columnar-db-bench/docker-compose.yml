services:
  mysql:
    image: mysql:8.0
    container_name: bench-mysql
    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_DATABASE: bench
    command:
      - --secure-file-priv=/data
      - --innodb-buffer-pool-size=2G
      - --innodb-log-file-size=512M
      - --innodb-flush-log-at-trx-commit=1
      - --local-infile=1
    volumes:
      - ./data:/data
      - mysql_data:/var/lib/mysql
    ports:
      - "13306:3306"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbench"]
      interval: 5s
      timeout: 5s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: bench-clickhouse
    environment:
      CLICKHOUSE_DB: bench
      CLICKHOUSE_USER: bench
      CLICKHOUSE_PASSWORD: bench
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./data:/data
      - clickhouse_data:/var/lib/clickhouse
      - ./schemas/clickhouse-config.xml:/etc/clickhouse-server/config.d/bench.xml:ro
    ports:
      - "18123:8123"
      - "19000:9000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8g
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mysql_data:
  clickhouse_data:
